<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,maximum-scale=1">
<meta name="theme-color" content="#5c3a2b">
<title>MIQĀT</title>
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Miqāt">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='112' fill='%235c3a2b'/%3E%3Crect x='150' y='150' width='212' height='212' fill='none' stroke='%23e3c071' stroke-width='13'/%3E%3Crect x='150' y='150' width='212' height='212' fill='none' stroke='%23e3c071' stroke-width='13' transform='rotate(45 256 256)'/%3E%3C/svg%3E">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='112' fill='%235c3a2b'/%3E%3Crect x='150' y='150' width='212' height='212' fill='none' stroke='%23e3c071' stroke-width='13'/%3E%3Crect x='150' y='150' width='212' height='212' fill='none' stroke='%23e3c071' stroke-width='13' transform='rotate(45 256 256)'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=IBM+Plex+Mono:wght@300;400;500&family=Noto+Naskh+Arabic:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --gold:#e3c071; --gold2:#f3d98c; --cream:#f4ede1; --soft:#e4d6c2; --muted:#c4ae95;
  --panel:rgba(22,12,7,.30); --panel2:rgba(20,11,6,.5);
  --border:rgba(232,201,122,.20); --border2:rgba(232,201,122,.40);
  --sep:rgba(0,0,0,.18); --done:#7ff0b6;
  --ease:cubic-bezier(.4,0,.2,1);
  --frame:100vw;   /* effective app width — full width on mobile, a phone-like column on desktop */
}
*{margin:0;padding:0;box-sizing:border-box}
html{-webkit-text-size-adjust:100%;height:100%}
button,input{font-family:inherit;-webkit-tap-highlight-color:transparent}
body{
  height:100%;overflow:hidden;color:var(--cream);
  font-family:'IBM Plex Mono',monospace;-webkit-font-smoothing:antialiased;
  background:
    radial-gradient(120% 46% at 50% 0%, rgba(196,134,98,.30), transparent 62%),
    linear-gradient(180deg,#7a4d3a 0%,#65402f 55%,#573626 100%);
  background-color:#5c3a2b;
}

/* ── Shell ── */
.app{display:flex;flex-direction:column;height:100dvh;
  padding:max(14px,env(safe-area-inset-top)) 0 max(10px,env(safe-area-inset-bottom))}

/* ── Top bar ── */
.topbar{position:relative;display:flex;flex-direction:column;align-items:center;
  padding:2px 56px 0;flex:0 0 auto}
.eyebrow{font-size:9px;letter-spacing:.42em;color:var(--gold);text-transform:uppercase;
  opacity:.9;padding-inline-start:.42em}
h1{font-family:'Cinzel',serif;font-weight:500;font-size:clamp(22px,6.4vw,29px);
  letter-spacing:.02em;color:var(--gold2);line-height:1.1;margin-top:3px}
.menuBtn{position:absolute;top:0;right:14px;width:40px;height:40px;border-radius:50%;
  border:1px solid var(--border);background:var(--panel);color:var(--gold);
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  transition:border-color .2s,color .2s}
.menuBtn:hover{border-color:var(--border2);color:var(--gold2)}
.menuBtn:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
.menuBtn svg{width:19px;height:19px}
.menu{position:absolute;top:46px;right:14px;z-index:70;min-width:158px;
  background:linear-gradient(180deg,rgba(38,23,14,.98),rgba(26,15,9,.98));
  border:1px solid var(--border2);border-radius:13px;padding:6px;
  box-shadow:0 14px 40px -8px rgba(0,0,0,.62);display:flex;flex-direction:column;gap:2px}
.menu[hidden]{display:none}
.menu button{font-size:12.5px;letter-spacing:.04em;color:var(--soft);background:transparent;
  border:none;border-radius:8px;padding:11px 12px;text-align:start;cursor:pointer;
  transition:background .15s,color .15s;display:flex;align-items:center;gap:9px}
.menu button:hover{background:rgba(255,255,255,.05);color:var(--gold2)}
.menu button.active{color:var(--gold2);background:rgba(227,192,113,.10)}
.menu .lab{font-size:8px;letter-spacing:.24em;text-transform:uppercase;color:var(--muted);
  padding:8px 12px 3px}
.menu .div{height:1px;background:var(--sep);margin:4px 6px}
.menu svg{width:14px;height:14px;flex:0 0 auto;opacity:.8}

/* ── Period selector (segmented) ── */
.dots{flex:0 0 auto;display:flex;gap:6px;justify-content:center;align-items:center;
  padding:15px 14px 12px}
.dot{position:relative;height:26px;flex:0 1 auto;min-width:20px;border:none;background:transparent;
  cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0}
.dot .pill{width:20px;height:4px;border-radius:3px;background:rgba(255,255,255,.16);
  transition:background .3s,width .3s,box-shadow .3s}
.dot[data-state="partial"] .pill{background:color-mix(in srgb,var(--dc) 60%,rgba(255,255,255,.14))}
.dot[data-state="complete"] .pill{background:var(--dc);box-shadow:0 0 9px -1px var(--dc)}
.dot[data-active="true"] .pill{width:30px;background:var(--gold2);box-shadow:0 0 10px -1px rgba(243,217,140,.6)}
.dot[data-active="true"][data-state="complete"] .pill{background:var(--dc)}
.dot:focus-visible{outline:2px solid var(--gold);outline-offset:3px;border-radius:6px}

/* ── Deck (iOS app-switcher rail) ── */
.rail{flex:1 1 auto;min-height:0;position:relative}
#deck{position:relative;height:100%;display:flex;align-items:stretch;
  overflow-x:auto;overflow-y:hidden;scroll-snap-type:x mandatory;
  padding:4px calc(var(--frame)*.07) 8px;scrollbar-width:none;-webkit-overflow-scrolling:touch;
  overscroll-behavior:contain}
#deck::-webkit-scrollbar{display:none}
.card{flex:0 0 calc(var(--frame)*.86);scroll-snap-align:center;
  padding:0 4px;will-change:transform;transform-origin:center 42%}
.cardInner{position:relative;height:100%;display:flex;flex-direction:column;overflow:hidden;
  background:linear-gradient(180deg,var(--panel2),var(--panel));
  border:1px solid var(--border);border-radius:24px;
  box-shadow:0 18px 44px -20px rgba(0,0,0,.6),inset 0 1px 0 rgba(255,255,255,.05)}
.cardInner::before{content:"";position:absolute;inset:0 0 auto 0;height:3px;
  background:linear-gradient(90deg,transparent,var(--dc),transparent);opacity:.85}
.card.sealed .cardInner{border-color:color-mix(in srgb,var(--dc) 55%,var(--border))}

/* card head */
.chead{flex:0 0 auto;padding:20px 22px 12px;display:flex;align-items:flex-start;gap:12px}
.cindex{font-family:'Cinzel',serif;font-size:12px;color:var(--dc);opacity:.7;
  letter-spacing:.05em;font-variant-numeric:tabular-nums;padding-top:4px}
.cname{font-family:'Cinzel',serif;font-size:clamp(16px,4.6vw,20px);letter-spacing:.11em;
  text-transform:uppercase;color:var(--dc);line-height:1.15}
.cmeta{margin-inline-start:auto;text-align:end;flex:0 0 auto}
.ccount{font-size:11px;letter-spacing:.08em;color:var(--muted);font-variant-numeric:tabular-nums}
.ccount b{color:var(--dc);font-weight:500}

/* ── Nodes / thread ── */
.nodes{flex:1 1 auto;min-height:0;overflow-y:auto;overflow-x:hidden;
  padding:12px 20px 8px;scrollbar-width:none}
.nodes::-webkit-scrollbar{display:none}
.nodesInner{position:relative}
.wire-fill{position:absolute;inset-inline-start:15px;width:2.5px;border-radius:2px;
  transform:translateX(-50%);pointer-events:none;z-index:0;
  height:0;background:linear-gradient(180deg,var(--dc),color-mix(in srgb,var(--dc) 55%,var(--gold2)));
  box-shadow:0 0 10px -1px var(--dc);transition:height .55s var(--ease),top .3s var(--ease)}

.row{position:relative;z-index:1;display:grid;grid-template-columns:30px 1fr auto;
  align-items:center;gap:10px;min-height:52px}
.bead{grid-column:1;width:23px;height:23px;border-radius:50%;justify-self:center;
  border:1.6px solid var(--border2);background:rgba(10,6,3,.35);cursor:pointer;padding:0;
  display:flex;align-items:center;justify-content:center;position:relative;
  transition:background .3s,border-color .3s,box-shadow .35s,transform .2s}
.bead svg{width:12px;height:12px;opacity:0;transform:scale(.4);transition:opacity .25s,transform .3s}
.bead.done{background:var(--dc);border-color:var(--dc);box-shadow:0 0 13px -2px var(--dc)}
.bead.done svg{opacity:1;transform:scale(1)}
.bead.current{border-color:var(--dc);animation:beadPulse 2.6s ease-in-out infinite}
@keyframes beadPulse{0%,100%{box-shadow:0 0 0 4px color-mix(in srgb,var(--dc) 22%,transparent)}
  50%{box-shadow:0 0 0 8px color-mix(in srgb,var(--dc) 5%,transparent)}}
.bead:focus-visible{outline:2px solid var(--gold);outline-offset:3px}
.bead.pop{animation:beadPop .5s var(--ease)}
@keyframes beadPop{0%{transform:scale(1)}40%{transform:scale(1.28)}100%{transform:scale(1)}}

.rtext{grid-column:2;font-size:15px;line-height:1.42;color:var(--cream);word-break:break-word;
  cursor:text;padding:6px 0;transition:color .3s,opacity .3s}
.row.done .rtext{color:var(--muted);text-decoration:line-through;
  text-decoration-color:color-mix(in srgb,var(--dc) 55%,transparent);opacity:.65}
.redit{grid-column:2;font-size:16px;line-height:1.42;color:var(--cream);min-width:0;width:100%;
  background:transparent;border:none;border-bottom:1px solid var(--dc);padding:2px 0;outline:none}
.rdel{grid-column:3;width:32px;height:34px;border:none;background:transparent;color:var(--muted);
  font-size:18px;line-height:1;cursor:pointer;opacity:0;border-radius:8px;
  display:flex;align-items:center;justify-content:center;transition:opacity .2s,color .2s}
.row:hover .rdel,.row:focus-within .rdel{opacity:.65}
.rdel:hover{color:#f0a07a;opacity:1}
.rdel:focus-visible{outline:2px solid var(--gold);outline-offset:1px;opacity:1}
@media (hover:none){ .rdel{opacity:.4} }

.empty{grid-column:1 / -1;color:var(--muted);opacity:.7;font-size:13px;line-height:1.7;
  padding:14px 2px 6px;text-align:start}

/* ── Add row ── */
.addrow{flex:0 0 auto;display:grid;grid-template-columns:30px 1fr;align-items:center;gap:10px;
  padding:10px 20px calc(14px + env(safe-area-inset-bottom));border-top:1px solid var(--sep)}
.plus{grid-column:1;width:23px;height:23px;justify-self:center;border-radius:50%;
  border:1.4px dashed var(--border2);background:transparent;color:var(--dc);font-size:15px;line-height:1;
  display:flex;align-items:center;justify-content:center;cursor:pointer;opacity:.85;
  transition:opacity .2s,border-color .2s}
.plus:hover{opacity:1;border-color:var(--dc)}
.plus:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
.addinput{grid-column:2;font-size:16px;color:var(--cream);background:transparent;border:none;
  outline:none;padding:8px 0;min-width:0}
.addinput::placeholder{color:var(--muted);opacity:.65;font-size:14px}

/* ── Swipe hint ── */
.hint{flex:0 0 auto;text-align:center;font-size:9px;letter-spacing:.22em;text-transform:uppercase;
  color:var(--muted);opacity:0;height:0;transition:opacity .5s;pointer-events:none}
.hint.show{opacity:.6;height:auto;padding-top:8px}

/* ── All-complete bloom ── */
.bloom{position:fixed;inset:0;z-index:90;pointer-events:none;display:flex;
  flex-direction:column;align-items:center;justify-content:center;gap:14px;opacity:0;
  background:radial-gradient(120% 80% at 50% 45%,rgba(243,217,140,.16),transparent 62%);
  transition:opacity .5s}
.bloom.show{opacity:1}
.bloom .ar{font-family:'Noto Naskh Arabic',serif;font-size:clamp(30px,9vw,46px);color:var(--gold2);
  direction:rtl;text-shadow:0 0 26px rgba(243,217,140,.5);transform:translateY(12px) scale(.94);
  transition:transform .6s cubic-bezier(.34,1.3,.6,1)}
.bloom.show .ar{transform:none}
.bloom .en{font-size:10px;letter-spacing:.28em;text-transform:uppercase;color:var(--soft)}
.bloom .reflect{font-size:11.5px;letter-spacing:.02em;color:var(--muted);max-width:290px;
  line-height:1.75;text-align:center;opacity:.9;margin-top:-2px;padding:0 8px}

@media (min-width:620px){
  /* On larger screens, present the app as a centered phone-like column
     instead of stretching edge to edge. Cards + peek scale to --frame. */
  body{display:flex;align-items:center;justify-content:center;padding:24px;
    background:
      radial-gradient(85% 58% at 50% -8%, rgba(227,192,113,.13), transparent 60%),
      radial-gradient(78% 70% at 50% 116%, rgba(126,77,52,.42), transparent 62%),
      radial-gradient(130% 120% at 50% 45%, #2f2015 0%, #1c130c 66%, #110a05 100%)}
  /* faint geometric tilework (the diamond / overlapping-squares motif),
     softly faded toward the edges so it frames the device without shouting */
  body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;
    background-image:url("data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20width='112'%20height='112'%20viewBox='0%200%20112%20112'%3E%3Cg%20fill='none'%20stroke='%23e3c071'%20stroke-width='1.1'%3E%3Crect%20x='35'%20y='35'%20width='42'%20height='42'/%3E%3Crect%20x='35'%20y='35'%20width='42'%20height='42'%20transform='rotate(45%2056%2056)'/%3E%3C/g%3E%3C/svg%3E");
    background-size:112px 112px;opacity:.06;
    -webkit-mask-image:radial-gradient(118% 84% at 50% 44%,#000 32%,transparent 80%);
    mask-image:radial-gradient(118% 84% at 50% 44%,#000 32%,transparent 80%)}
  .app{--frame:420px;width:420px;height:min(900px,calc(100dvh - 48px));
    border-radius:32px;overflow:hidden;position:relative;
    background:
      radial-gradient(120% 46% at 50% 0%, rgba(196,134,98,.30), transparent 62%),
      linear-gradient(180deg,#7a4d3a 0%,#65402f 55%,#573626 100%);
    border:1px solid rgba(232,201,122,.16);
    box-shadow:0 50px 130px -40px rgba(0,0,0,.78),0 0 0 1px rgba(0,0,0,.28),
      0 0 80px -26px rgba(227,192,113,.20),inset 0 1px 0 rgba(255,255,255,.06)}
  .bloom{width:420px;height:min(900px,calc(100dvh - 48px));inset:auto;left:50%;top:50%;
    transform:translate(-50%,-50%);border-radius:32px;overflow:hidden}
}

@media (prefers-reduced-motion:reduce){
  *{transition-duration:.01ms!important;animation-duration:.01ms!important}
  .card{transform:none!important}
}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="eyebrow" id="eyebrow">Ṭālib al-ʿIlm</div>
    <h1 id="title">Miqāt</h1>
    <button class="menuBtn" id="menuBtn" aria-label="Menu" aria-haspopup="true">
      <svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="5" r="1.9"/><circle cx="12" cy="12" r="1.9"/><circle cx="12" cy="19" r="1.9"/></svg>
    </button>
    <div class="menu" id="menu" hidden>
      <div class="lab" id="mLang">Language</div>
      <button data-lang="en">English</button>
      <button data-lang="de">Deutsch</button>
      <div class="div"></div>
      <button id="exportBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12m0 0l-4-4m4 4l4-4M4 17v2a2 2 0 002 2h12a2 2 0 002-2v-2"/></svg>
        <span id="exportLbl">Export</span></button>
      <button id="importBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 15V3m0 0L8 7m4-4l4 4M4 17v2a2 2 0 002 2h12a2 2 0 002-2v-2"/></svg>
        <span id="importLbl">Import</span></button>
      <input type="file" id="importFile" accept="application/json,.json" hidden>
    </div>
  </div>

  <div class="dots" id="dots" role="tablist" aria-label="Prayer periods"></div>

  <div class="rail">
    <div id="deck"></div>
  </div>

  <div class="hint" id="hint"></div>
</div>

<div class="bloom" id="bloom" aria-hidden="true">
  <div class="ar">الحمد لله</div>
  <div class="en" id="bloomEn">Every task complete</div>
  <div class="reflect" id="bloomReflect"></div>
</div>

<script>
"use strict";
const PERIODS=[
  {key:"maghribIsha",accent:"#d27a5c"},
  {key:"afterIsha",  accent:"#8186bd"},
  {key:"beforeFajr", accent:"#6a6da8"},
  {key:"fajrDhuhr",  accent:"#6f93b4"},
  {key:"dhuhrAsr",   accent:"#e6c873"},
  {key:"asrMaghrib", accent:"#d9a25f"}
];
const I18N={
  en:{dir:"ltr",label:"English",eyebrow:"Ṭālib al-ʿIlm",title:"Miqāt",addTask:"Add a task",
      language:"Language",export:"Export",import:"Import",doneMsg:"Every task complete",
      empty:"No tasks yet — add the first below.",swipe:"Swipe to move between periods",
      reflect:"Do not forget to reflect on your actions and to make Istighfār / Tawbah",
      periods:["Maghrib – Isha","After Isha","Before Fajr","Fajr – Dhuhr","Dhuhr – Asr","Asr – Maghrib"]},
  de:{dir:"ltr",label:"Deutsch",eyebrow:"Ṭālib al-ʿIlm",title:"Miqāt",addTask:"Aufgabe hinzufügen",
      language:"Sprache",export:"Exportieren",import:"Importieren",doneMsg:"Alle Aufgaben erledigt",
      empty:"Noch keine Aufgaben — füge unten die erste hinzu.",swipe:"Wischen, um den Zeitraum zu wechseln",
      reflect:"Vergiss nicht, über deine Taten nachzudenken und Istighfār / Tawba zu machen",
      periods:["Maghrib – Ischa","Nach Ischa","Vor Fajr","Fajr – Dhuhr","Dhuhr – Asr","Asr – Maghrib"]}
};
const LANG_STORE="talib_planner_lang";
let LANG=(function(){try{const l=localStorage.getItem(LANG_STORE);if(I18N[l])return l;const n=(navigator.language||'en').slice(0,2);return I18N[n]?n:"en";}catch(e){return "en";}})();
function T(){return I18N[LANG];}

/* ── Data (unchanged store + shape) ── */
const STORE="talib_planner_v3";
const CHECK_SVG='<svg viewBox="0 0 12 12" fill="none" stroke="#20130a" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M2.5 6.5L5 9l4.5-5"/></svg>';
let DATA=load();
function blank(){const o={};PERIODS.forEach(p=>o[p.key]=[]);return o;}
function load(){
  try{
    const d=JSON.parse(localStorage.getItem(STORE)||"null");
    if(!d||typeof d!=="object")return blank();
    const o=blank();
    PERIODS.forEach(p=>{if(Array.isArray(d[p.key]))o[p.key]=d[p.key].filter(t=>t&&typeof t.t==="string")
      .map(t=>({id:t.id||uid(),t:String(t.t).slice(0,200),done:!!t.done}));});
    return o;
  }catch(e){return blank();}
}
function save(){try{localStorage.setItem(STORE,JSON.stringify(DATA));}catch(e){}}
function uid(){try{return crypto.randomUUID();}catch(e){return Date.now()+"-"+Math.random().toString(36).slice(2,8);}}
function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

const REDUCED=window.matchMedia("(prefers-reduced-motion:reduce)").matches;
const deck=document.getElementById("deck");
const dotsEl=document.getElementById("dots");
let cards=[],dots=[],activeIdx=0,advanceTimer=null;

/* ── Build the deck ── */
function buildDeck(){
  const keepKey=cards[activeIdx]?cards[activeIdx].dataset.key:null;
  deck.innerHTML="";dotsEl.innerHTML="";cards=[];dots=[];
  PERIODS.forEach((p,i)=>{
    const name=T().periods[i];
    const card=document.createElement("div");
    card.className="card";card.dataset.key=p.key;card.style.setProperty("--dc",p.accent);
    card.innerHTML=
      `<div class="cardInner">
        <div class="chead">
          <span class="cindex">${String(i+1).padStart(2,"0")}</span>
          <div><div class="cname">${name}</div></div>
          <div class="cmeta"><div class="ccount"></div></div>
        </div>
        <div class="nodes"><div class="nodesInner"></div></div>
        <div class="addrow">
          <button class="plus" aria-label="${esc(T().addTask)}">+</button>
          <input class="addinput" type="text" maxlength="160" enterkeyhint="done" autocomplete="off"
                 autocapitalize="sentences" placeholder="${esc(T().addTask)}" aria-label="${esc(T().addTask)} — ${esc(name)}">
        </div>
      </div>`;
    // add-task wiring
    const input=card.querySelector(".addinput");
    const commit=()=>{const v=input.value.trim();if(v){addTask(i,v);input.value="";input.focus();}};
    input.addEventListener("keydown",e=>{if(e.key==="Enter"){e.preventDefault();commit();}});
    card.querySelector(".plus").addEventListener("click",()=>{if(input.value.trim())commit();else input.focus();});
    deck.appendChild(card);cards.push(card);

    // selector dot
    const dot=document.createElement("button");
    dot.className="dot";dot.style.setProperty("--dc",p.accent);
    dot.setAttribute("role","tab");dot.setAttribute("aria-label",name);
    dot.innerHTML='<span class="pill"></span>';
    dot.addEventListener("click",()=>gotoCard(i,true));
    dotsEl.appendChild(dot);dots.push(dot);

    buildNodes(card,i);
  });
  // restore position
  let start=0;if(keepKey){const k=PERIODS.findIndex(p=>p.key===keepKey);if(k>=0)start=k;}
  requestAnimationFrame(()=>{ gotoCard(start,false); cards.forEach((_,i)=>{updateCardState(i);}); applyTransforms(); });
}

/* ── Rows / thread ── */
function buildNodes(card,i){
  const inner=card.querySelector(".nodesInner");
  const list=DATA[PERIODS[i].key];
  inner.innerHTML='<div class="wire-fill"></div>';
  if(!list.length){
    const e=document.createElement("div");e.className="row";
    e.innerHTML=`<span class="empty">${esc(T().empty)}</span>`;
    inner.appendChild(e);
  }else{
    list.forEach(t=>inner.appendChild(rowEl(i,t)));
  }
  updateCardState(i);
}
function rowEl(i,t){
  const row=document.createElement("div");
  row.className="row"+(t.done?" done":"");row.dataset.id=t.id;
  const bead=document.createElement("button");
  bead.className="bead"+(t.done?" done":"");bead.type="button";
  bead.setAttribute("aria-pressed",t.done?"true":"false");
  bead.setAttribute("aria-label",t.done?"Mark not done":"Mark done");
  bead.innerHTML=CHECK_SVG;
  bead.addEventListener("click",()=>toggle(i,t.id,bead));
  const text=document.createElement("span");
  text.className="rtext";text.textContent=t.t;
  text.addEventListener("click",()=>editRow(i,t,row));
  const del=document.createElement("button");
  del.className="rdel";del.type="button";del.setAttribute("aria-label","Delete task");del.textContent="×";
  del.addEventListener("click",()=>delTask(i,t.id));
  row.append(bead,text,del);
  return row;
}

/* ── State + wire measurement ── */
function firstIncomplete(list){for(let i=0;i<list.length;i++)if(!list[i].done)return i;return -1;}
function updateCardState(i){
  const card=cards[i];if(!card)return;
  const list=DATA[PERIODS[i].key];
  const done=list.filter(t=>t.done).length;
  const k=firstIncomplete(list);
  card.querySelector(".ccount").innerHTML=list.length?`<b>${done}</b> / ${list.length}`:"";
  // per-row bead states
  const rows=card.querySelectorAll(".nodesInner .row[data-id]");
  rows.forEach((row,idx)=>{
    const t=list[idx];if(!t)return;
    row.classList.toggle("done",t.done);
    const bead=row.querySelector(".bead");
    bead.classList.toggle("done",t.done);
    bead.classList.toggle("current",!t.done&&idx===k);
    bead.setAttribute("aria-pressed",t.done?"true":"false");
  });
  const sealed=list.length>0&&k===-1;
  card.classList.toggle("sealed",sealed);
  setDot(i,done,list.length);
  measureWire(card,list,k);
}
/* Cumulative top of an element within an ancestor, in layout space
   (walks offsetParent chain, so it's immune to the card's scale transform
   and to each row being its own positioning context). */
function topWithin(el,root){let y=0,n=el;while(n&&n!==root){y+=n.offsetTop;n=n.offsetParent;}return y;}
function measureWire(card,list,k){
  const inner=card.querySelector(".nodesInner");
  const fill=inner.querySelector(".wire-fill");
  const beads=inner.querySelectorAll(".row[data-id] .bead");
  if(beads.length<1){fill.style.height="0px";return;}
  const c=[...beads].map(b=>topWithin(b,inner)+b.offsetHeight/2);
  const start=Math.max(0,c[0]-18);      // small lead-in above the first task
  const last=c[c.length-1];
  // The line exists only where you've finished tasks: it grows down to the
  // LAST completed task, one segment at a time, until it reaches the last.
  let end;
  if(k===-1)end=last;                   // all done → full line to the last task
  else if(k===0)end=start;              // nothing done → no line
  else end=c[k-1];                      // last completed task
  fill.style.top=start+"px";fill.style.height=Math.max(0,end-start)+"px";
}
function setDot(i,done,total){
  const dot=dots[i];if(!dot)return;
  let state="none";
  if(total>0&&done===total)state="complete";
  else if(done>0)state="partial";
  dot.dataset.state=state;
}

/* ── Actions ── */
function toggle(i,id,bead){
  const list=DATA[PERIODS[i].key];const t=list.find(x=>x.id===id);if(!t)return;
  t.done=!t.done;save();
  if(t.done&&bead){bead.classList.remove("pop");void bead.offsetWidth;bead.classList.add("pop");}
  updateCardState(i);
  if(t.done&&allComplete()){celebrate();return;}   // every task done → الحمد لله
  const sealed=list.length>0&&firstIncomplete(list)===-1;
  if(sealed){ clearTimeout(advanceTimer);advanceTimer=setTimeout(()=>{const n=nextIncomplete(i);if(n>=0)gotoCard(n,true);},700); }
}
function addTask(i,text){
  DATA[PERIODS[i].key].push({id:uid(),t:text,done:false});save();
  buildNodes(cards[i],i);
}
function delTask(i,id){
  const k=PERIODS[i].key;DATA[k]=DATA[k].filter(t=>t.id!==id);save();
  buildNodes(cards[i],i);
}
function editRow(i,t,row){
  if(row.querySelector(".redit"))return;
  const text=row.querySelector(".rtext");
  const input=document.createElement("input");
  input.className="redit";input.value=t.t;input.maxLength=200;
  row.replaceChild(input,text);input.focus();input.setSelectionRange(input.value.length,input.value.length);
  let closed=false;
  const finish=(commit)=>{ if(closed)return;closed=true;
    if(commit){const v=input.value.trim();if(v){t.t=v;save();}}
    buildNodes(cards[i],i);
  };
  input.addEventListener("keydown",e=>{
    if(e.key==="Enter"){e.preventDefault();finish(true);}
    else if(e.key==="Escape"){e.preventDefault();finish(false);}
  });
  input.addEventListener("blur",()=>finish(true));
}

/* ── Completion / reset ── */
function allComplete(){
  let total=0,done=0;
  PERIODS.forEach(p=>{total+=DATA[p.key].length;done+=DATA[p.key].filter(t=>t.done).length;});
  return total>0&&done===total;
}
function celebrate(){
  clearTimeout(advanceTimer);
  const bloom=document.getElementById("bloom");
  bloom.classList.add("show");
  setTimeout(()=>{ bloom.classList.remove("show"); resetAll(); },3200);
}
function resetAll(){
  PERIODS.forEach(p=>DATA[p.key].forEach(t=>t.done=false));
  save();
  cards.forEach((c,i)=>{buildNodes(c,i);});
  gotoCard(0,true);
}
function nextIncomplete(from){
  const n=PERIODS.length;
  for(let s=1;s<=n;s++){const i=(from+s)%n;const list=DATA[PERIODS[i].key];if(list.length&&list.some(t=>!t.done))return i;}
  return -1;
}

/* ── Carousel: app-switcher scaling + active tracking ── */
let rafPending=false;
function applyTransforms(){
  const center=deck.scrollLeft+deck.clientWidth/2;
  let best=0,bestD=1e9;
  cards.forEach((card,i)=>{
    const cc=card.offsetLeft+card.offsetWidth/2;
    const d=(cc-center)/deck.clientWidth;
    const ad=Math.min(Math.abs(d),1);
    if(!REDUCED)card.style.transform=`scale(${(1-ad*0.12).toFixed(4)})`;
    card.style.opacity=(1-ad*0.5).toFixed(3);
    if(ad<bestD){bestD=ad;best=i;}
  });
  if(best!==activeIdx){activeIdx=best;dots.forEach((d,i)=>d.dataset.active=(i===best)?"true":"false");}
}
deck.addEventListener("scroll",()=>{
  if(rafPending)return;rafPending=true;
  requestAnimationFrame(()=>{rafPending=false;applyTransforms();});
},{passive:true});
let settleTimer=null;
deck.addEventListener("scroll",()=>{
  clearTimeout(settleTimer);
  settleTimer=setTimeout(()=>{ if(cards[activeIdx])updateCardState(activeIdx); },140);
},{passive:true});

function gotoCard(i,smooth){
  const card=cards[i];if(!card)return;
  const left=card.offsetLeft-(deck.clientWidth-card.offsetWidth)/2;
  deck.scrollTo({left,behavior:(smooth&&!REDUCED)?"smooth":"auto"});
  activeIdx=i;dots.forEach((d,j)=>d.dataset.active=(j===i)?"true":"false");
}

window.addEventListener("resize",()=>{
  const i=activeIdx;requestAnimationFrame(()=>{gotoCard(i,false);cards.forEach((_,j)=>measureWire(cards[j],DATA[PERIODS[j].key],firstIncomplete(DATA[PERIODS[j].key])));applyTransforms();});
});

/* ── Menu / language / export / import ── */
const menuBtn=document.getElementById("menuBtn"),menu=document.getElementById("menu");
menuBtn.addEventListener("click",e=>{e.stopPropagation();menu.hidden=!menu.hidden;});
document.addEventListener("click",e=>{if(!menu.hidden&&!menu.contains(e.target)&&e.target!==menuBtn)menu.hidden=true;});
menu.querySelectorAll("button[data-lang]").forEach(b=>b.addEventListener("click",()=>{applyLang(b.dataset.lang);menu.hidden=true;}));
document.getElementById("exportBtn").addEventListener("click",()=>{menu.hidden=true;exportData();});
document.getElementById("importBtn").addEventListener("click",()=>{document.getElementById("importFile").click();});
document.getElementById("importFile").addEventListener("change",importData);

function exportData(){
  const blob=new Blob([JSON.stringify({app:"talib-planner",v:2,tasks:DATA},null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob);const a=document.createElement("a");
  a.href=url;a.download="miqat-tasks.json";document.body.appendChild(a);a.click();a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),1500);
}
function importData(e){
  const f=e.target.files[0];if(!f)return;const r=new FileReader();
  r.onload=ev=>{
    try{
      const p=JSON.parse(ev.target.result);const src=(p&&p.tasks)?p.tasks:p;
      if(!src||typeof src!=="object")throw 0;
      const clean=blank();
      PERIODS.forEach(pr=>{if(Array.isArray(src[pr.key]))clean[pr.key]=src[pr.key]
        .filter(t=>t&&typeof t.t==="string").map(t=>({id:t.id||uid(),t:String(t.t).slice(0,200),done:!!t.done}));});
      DATA=clean;save();buildDeck();
    }catch(err){alert("That file isn't a valid planner export.");}
    e.target.value="";
  };
  r.readAsText(f);
}

/* ── Language ── */
function applyLang(lang){
  if(!I18N[lang])lang="en";LANG=lang;
  try{localStorage.setItem(LANG_STORE,lang);}catch(e){}
  const t=I18N[lang];document.documentElement.lang=lang;document.documentElement.dir=t.dir;
  document.getElementById("eyebrow").textContent=t.eyebrow;
  document.getElementById("title").textContent=t.title;
  document.getElementById("mLang").textContent=t.language;
  document.getElementById("exportLbl").textContent=t.export;
  document.getElementById("importLbl").textContent=t.import;
  document.getElementById("bloomEn").textContent=t.doneMsg;
  document.getElementById("bloomReflect").textContent=t.reflect;
  document.getElementById("hint").textContent=t.swipe;
  menu.querySelectorAll("button[data-lang]").forEach(b=>b.classList.toggle("active",b.dataset.lang===lang));
  buildDeck();
}

/* ── One-time swipe hint ── */
function maybeHint(){
  try{if(localStorage.getItem("talib_planner_hint"))return;}catch(e){}
  const h=document.getElementById("hint");h.classList.add("show");
  setTimeout(()=>h.classList.remove("show"),4200);
  try{localStorage.setItem("talib_planner_hint","1");}catch(e){}
}

/* ── Init ── */
applyLang(LANG);
maybeHint();
</script>
